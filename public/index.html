<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk STK Push - OptimaPay</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <span class="logo-icon">💳</span>
                <h1>Bulk STK Push</h1>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span>Ready</span>
            </div>
        </header>

        <main>
            <div class="card">
                <h2>Send Bulk Payments</h2>
                <p class="subtitle">Enter phone numbers and payment details to send STK Push requests</p>

                <form id="paymentForm">
                    <div class="form-group">
                        <label for="phoneNumbers">
                            Phone Numbers
                            <span class="hint">One per line, format: 254712345678</span>
                        </label>
                        <textarea 
                            id="phoneNumbers" 
                            rows="10" 
                            placeholder="254712345678&#10;254798765432&#10;254723456789"
                            required
                        ></textarea>
                        <div class="counter" id="phoneCounter">0 numbers</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="amount">Amount (KES)</label>
                            <div class="amount-input-wrapper">
                                <span class="currency-symbol">KES</span>
                                <input 
                                    type="number" 
                                    id="amount" 
                                    placeholder="Enter amount" 
                                    min="1" 
                                    step="0.01"
                                    required
                                />
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reference">Reference (Optional)</label>
                            <input 
                                type="text" 
                                id="reference" 
                                placeholder="e.g., BULK_001"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <input 
                            type="text" 
                            id="description" 
                            placeholder="e.g., Bulk payment for salaries"
                        />
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="submitBtn" class="btn btn-primary">
                            <span class="btn-icon">🚀</span>
                            Send Payments
                        </button>
                        <button type="reset" id="resetBtn" class="btn btn-secondary">
                            Clear All
                        </button>
                    </div>
                </form>
            </div>

            <!-- Progress/Results Section -->
            <div id="resultsSection" class="card results-card" style="display: none;">
                <h2>Payment Results</h2>
                <div id="resultsContent">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Recent Batches -->
            <div class="card">
                <div class="card-header">
                    <h2>Recent Batches</h2>
                    <button id="refreshBatchesBtn" class="btn btn-small">
                        🔄 Refresh
                    </button>
                </div>
                <div id="batchesList">
                    <p class="empty-message">No batches processed yet</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Bulk STK Push App | Built with OptimaPay API</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
